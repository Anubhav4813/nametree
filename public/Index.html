<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NameTree</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="root">
        <div class="card">
            <h1>NameTree</h1>
            <p class="sub">Generate a randomized username from any name</p>

            <form id="nameForm" class="form">
                <div>
                    <label for="name">Enter Name</label>
                    <input id="name" name="name" type="text" placeholder="John Doe" required />
                </div>
                <button type="submit">Generate Username</button>
            </form>

            <div class="result">
                <div class="result-lbl">Output</div>
                <div id="result" class="result-val">Your result appears here</div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>

</html>
